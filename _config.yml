title: Bullets
tagline: An app studio
description: >-
  Bullets is an app studio. We make apps you can just open — most need no
  account, they keep your data on your device, and they are free. Cineepp,
  Pilmie, Drawwii and Unrearix, on iOS and Android.
url: "https://bullets.co.kr"
lang: en

email: develop@bullets.co.kr
github_org: develop-bullets
logo: /assets/brand/og-default.png

# jekyll-seo-tag and jekyll-sitemap ship inside the github-pages gem, so GitHub
# Pages enables them from this list alone — no Gemfile change, no build step.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

social:
  name: Bullets
  links:
    - https://github.com/develop-bullets

defaults:
  - scope:
      path: ""
    values:
      image: /assets/brand/og-default.png

# Defining a `pages` collection shadows Liquid's built-in `site.pages`: Jekyll's
# SiteDrop resolves a key to the collection whenever the names collide, so
# `site.pages` here iterates the documents in _pages/. That is deliberate — it
# keeps the `layout: page` / `include_in_header` / `/:path/` conventions shared
# with the Pilmie landing repo and its legal-page sync script. (jekyll-sitemap
# reads Ruby objects, not Liquid, so it is unaffected.)
collections:
  pages:
    output: true
    permalink: /:path/

sass:
  style: compressed

markdown: kramdown

# CNAME is intentionally NOT excluded: keeping it in _site preserves the custom
# domain. `tools/` is a local asset-import script, not site content.
exclude:
  - LICENSE
  - README.md
  - Gemfile
  - Gemfile.lock
  - tools
