<!DOCTYPE html>
<html lang="{{ site.lang }}">
{% include head.html %}
<body>
  {% include header.html %}

  <main>
    <div class="container">
      <article class="prose">
        <h1>{{ page.title }}</h1>
        {%- if page.updated %}
        <p class="prose__meta">Last updated {{ page.updated }}</p>
        {%- endif %}
        {{ content }}
      </article>
    </div>
  </main>

  {% include footer.html %}
</body>
</html>
