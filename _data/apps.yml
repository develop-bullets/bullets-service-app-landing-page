- slug: pilmie
  name: Pilmie
  tagline: "Track reading & share reviews"
  summary: "Log your reading, build streaks, and share book reviews with fellow readers."
  lead: "Pilmie is a cozy home for everything you read. Search for any book, keep a personal reading log, and share honest reviews with a community of readers who love books as much as you do."

  accent: "#F4AA2B"
  accent_soft: "#FFC978"
  accent_ink: "#3A2E24"
  surface: paper

  ios_id: "6749807731"
  appstore_url: "https://apps.apple.com/app/id6749807731"
  play_url: "https://play.google.com/store/apps/details?id=kr.co.bullets.pilmie"
  website: "https://pilmie.com"
  privacy_url: "https://pilmie.com/privacy/"
  terms_url: "https://pilmie.com/terms/"

  price: Free
  platforms: "iOS · Android"
  # No "No account" chip — Pilmie requires social sign-in.
  chips:
    - Community
    - Free

  icon: /assets/apps/pilmie/icon.webp
  og_image: /assets/brand/og-default.png

  features:
    - title: Build a reading habit
      body: "Check in every day and watch your reading streak grow. Set an annual goal and track every book you finish."
    - title: Your personal library
      body: "Sort every book into Want to read, Reading, and Read, and pick up right where you left off."
    - title: Write &amp; discover reviews
      body: "Rate books, write reviews, and browse thoughtful takes from other readers. Sort by latest or most loved."
    - title: Save the lines that stay with you
      body: "Highlight your favorite sentences, revisit them anytime, and share them as beautiful cards."
    - title: Find your next read
      body: "A fresh \"Today's book,\" mood-based collections — a light read for the commute, something comforting when you're worn out, a poem before sleep — and the books people are reading right now."
    - title: Follow readers you trust
      body: "Follow reviewers whose taste you love, and their new reviews gather on your home. Like and comment to keep the conversation going."
    - title: Look back on your year
      body: "Turn your year of reading into a shareable card."

  screenshots:
    - file: 01-home.webp
      alt: "Home feed of reviews from readers you follow"
    - file: 02-shelf.webp
      alt: "Your shelf — want to read, reading, and read"
    - file: 03-profile.webp
      alt: "Reading profile with streak and annual goal"
    - file: 04-review_detail.webp
      alt: "A book review with likes and comments"
    - file: 05-book_detail.webp
      alt: "Book detail with ratings and reviews"

  attributions:
    - text: "Book data provided by the Naver Book Search API. Titles shown are from Korean sources."

