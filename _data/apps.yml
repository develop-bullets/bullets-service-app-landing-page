# Single source of truth for the four Bullets apps.
# The home page grid (_layouts/home.html) and every app detail page
# (_layouts/app.html) read from this file. Look it up by slug:
#   {% assign app = site.data.apps | where: "slug", page.app | first %}
#
# COPY ORIGIN — do not invent marketing copy; it comes from each app's store listing:
#   cineepp  : bullets/cineepp/docs/store-listing.md                (## 🇺🇸 English)
#   pilmie   : bullets/pilmie/docs/store-listing.md                 (## 1-1. English)
#   drawwii  : bullets/drawwii/docs/store-listing-copy-2026-07-02.md (## 1. English)
#   unrearix : bullets/unrearix/docs/store-listing.md               (### 1-EN. English)
#
# ⚠ `title` / `description` / `image` are duplicated in each _pages/<slug>.md front
#   matter because jekyll-seo-tag cannot read data files. Change copy in both places.
#
# ⚠ COMPLIANCE — these are not style preferences:
#   cineepp  : the TMDB attribution below is required by the TMDB API terms.
#   unrearix : only 5 of 48 songs are bundled for in-app playback. Never imply
#              unlimited or full streaming (App Store Guideline 4.2.2).
#   pilmie   : requires social sign-in. Never give it a "No account" chip.
#   drawwii  : say "290+" templates (293 internally) and keep the on-device /
#              never-uploaded promise explicit.

- slug: cineepp
  name: Cineepp
  tagline: "Watchlist & smart taste picks"
  summary: "Browse movies and TV, swipe trending trailers, build a watchlist, and get taste-based picks."
  lead: "Cineepp is your all-in-one home for movies and TV — discover what to watch, swipe through trending trailers, save your picks and explore your viewing taste. No account, no sign-up, completely free."

  accent: "#FFB300"
  accent_soft: "#FFD54F"
  accent_ink: "#1A1205"
  surface: dark

  ios_id: "6753153863"
  appstore_url: "https://apps.apple.com/app/id6753153863"
  play_url: "https://play.google.com/store/apps/details?id=kr.co.bullets.cineepp"
  website: "https://cineepp.com"
  privacy_url: "https://cineepp.com/privacy/"
  terms_url: "https://cineepp.com/terms/"

  price: Free
  platforms: "iOS · Android"
  chips:
    - No account
    - On device
    - Free

  icon: /assets/apps/cineepp/icon.webp
  og_image: /assets/brand/og-default.png

  features:
    - title: Movies
      body: "Browse trending, in theaters, top rated and all-time favorites. Narrow down by genre, streaming service, release year, runtime, language and rating, then go deep on cast &amp; crew, reviews, recommendations and collections."
    - title: TV
      body: "See seasons and episodes at a glance, compare how each season was rated, and check upcoming air dates and where to watch. Discover K-dramas and Korean variety shows."
    - title: Trailers
      body: "Flip vertically through a never-ending feed of trending movie and TV trailers, playing right inside the app."
    - title: Saved
      body: "Bookmark what you want to watch, mark what you've already seen, and check off episodes as you go. Everything stays on your device — no account, no sync required."
    - title: My Activity
      body: "See what to watch next, your viewing stats, your taste by genre and decade, and a calendar of everything you've watched. The more you mark as watched, the sharper your recommendations get."

  screenshots:
    - file: 01-korean.webp
      alt: "Korean wave — K-dramas, K-movies and variety shows"
    - file: 02-discover.webp
      alt: "Discover trending movies and TV in one place"
    - file: 03-movie.webp
      alt: "Movie detail with cast, ratings and reviews"
    - file: 04-series.webp
      alt: "Series detail with seasons and per-season ratings"
    - file: 05-trailers.webp
      alt: "Vertical feed of trending trailers"
    - file: 06-save.webp
      alt: "Watchlist saved on your device"
    - file: 07-activity.webp
      alt: "Viewing stats and taste analysis"

  attributions:
    - text: "This product uses the TMDB API but is not endorsed or certified by TMDB."
      logo: /assets/apps/cineepp/tmdb.png
      logo_alt: TMDB
      href: "https://www.themoviedb.org/"

