- slug: drawwii
  name: Drawwii
  tagline: "Background eraser & templates"
  summary: "Draw with pressure brushes. Remove photo backgrounds and objects — on-device AI."
  lead: "Drawwii turns your phone into a full creative studio — draw freely, edit photos with on-device AI, and turn ideas into finished designs, all in one app."

  accent: "#DF64A3"
  accent_soft: "#F191C4"
  accent_ink: "#2A0C1C"
  surface: dark

  ios_id: "6751758802"
  appstore_url: "https://apps.apple.com/app/id6751758802"
  play_url: "https://play.google.com/store/apps/details?id=kr.co.bullets.drawwii"
  website: "https://drawwii.com"
  privacy_url: "https://drawwii.com/privacy/"
  terms_url: "https://drawwii.com/terms/"

  price: Free
  platforms: "iOS · Android"
  chips:
    - No account
    - On-device AI
    - Free

  icon: /assets/apps/drawwii/icon.webp
  og_image: /assets/brand/og-default.png

  features:
    - title: Draw freely
      body: "8 pressure-sensitive brushes — pen, highlighter, calligraphy, neon, spray, marker, pencil and eraser. 10 shapes with gradient fill, selection and transform tools, unlimited layers with blend modes, symmetry mode and a pinch-to-zoom canvas."
    - title: Edit photos — privately, on your device
      body: "Magic Eraser removes unwanted objects with AI inpainting. Background Remover cuts out the subject and swaps in a color, gradient, photo or blur. All AI processing happens on your device — your photos are never uploaded to a server."
    - title: Collage &amp; templates
      body: "Combine photos with grid or freeform collage layouts, or start from 290+ ready-made templates across 20+ categories — invitations, planners, checklists and celebrations — then keep editing right in the drawing editor."
    - title: Stickers &amp; photo elements
      body: "Add emoji stickers or cut-out photos as movable layers. Draw directly on top of a photo, or overlay a reference image while you sketch."
    - title: More tools, one tap away
      body: "Filters, watermarks, borders and frames, social resize presets, batch background removal, an image compressor, image-to-PDF, a document scanner, a QR code generator, a GIF maker and photo stitching."
    - title: Build a drawing habit
      body: "Track your daily drawing streak, see your activity heatmap, and take on weekly challenges. Your gallery stays organized with search, tags, favorites, trash with undo, and full backup &amp; restore."

  screenshots:
    - file: 01-draw.webp
      alt: "Draw freely with 8 pressure-sensitive brushes"
    - file: 02-eraser_before_after.webp
      alt: "Magic Eraser: erase anything with on-device AI"
    - file: 03-bg_remove.webp
      alt: "Remove backgrounds instantly — no upload needed"
    - file: 04-templates.webp
      alt: "290+ templates across 20+ categories"
    - file: 05-stickers.webp
      alt: "Add stickers and photo cutouts to your art"
    - file: 06-habit.webp
      alt: "Build a daily drawing habit"
    - file: 07-gallery.webp
      alt: "Your gallery, organized your way"

