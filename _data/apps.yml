- slug: unrearix
  name: Unrearix
  tagline: "Songs, videos & synced lyrics"
  summary: "The official Unrearix app — play songs, watch videos, and follow every lyric."
  lead: "Unrearix is a creative music team under one artist brand, moving freely across genres, styles and voices to shape a boundary-free sound. This is the official Unrearix app: an immersive home for every song, video and moment from the team."

  accent: "#FF2DA8"
  accent_soft: "#FF6AC4"
  accent_ink: "#14000B"
  surface: dark

  ios_id: "6752011330"
  appstore_url: "https://apps.apple.com/app/id6752011330"
  play_url: "https://play.google.com/store/apps/details?id=kr.co.bullets.unrearix"
  website: "https://unrearix.com/"
  privacy_url: "https://unrearix.com/privacy"

  price: Free
  platforms: "iOS · Android"
  chips:
    - No account
    - Works offline
    - Free

  icon: /assets/apps/unrearix/icon.webp
  og_image: /assets/brand/og-default.png

  features:
    # ⚠ 4.2.2: "browse the discography and play in the app" — never "stream everything".
    - title: Play, right here
      body: "Browse the full Unrearix discography and play in the app, with background and lock-screen controls, a persistent mini-player, and a full-screen player tinted by each cover's colors. Follow every word with time-synced lyrics that scroll as the song plays."
    - title: Watch
      body: "Dive into the full video collection — releases, live moments and mixes — plus curated playlists that set the mood."
    - title: Your library
      body: "Like your favorites, build and reorder your own playlists, and save the videos you want to return to. Turn any lyric into a shareable card or a phone wallpaper with the built-in makers."
    - title: Your lounge
      body: "Check in daily to build your streak, climb fan-pass tiers, and earn badges. Take lyric quizzes, vote in polls, and open your personal listening Recap — your most-played tracks in a share-ready story card."
    - title: No login. Fully yours.
      body: "No account, no sign-up. Your likes, playlists, streaks and history stay on your device — and the core experience works completely offline. Release countdowns, reminders and home-screen widgets keep the next moment one glance away."

  screenshots:
    - file: 01-player.webp
      alt: "Full-screen player with time-synced lyrics"
    - file: 02-music.webp
      alt: "Browse the full Unrearix discography"
    - file: 03-artist.webp
      alt: "The artist page — boundary-free sound"
    - file: 04-videos.webp
      alt: "Every music video and live moment"
    - file: 05-create.webp
      alt: "Turn a lyric into a card or wallpaper"
    - file: 06-lounge.webp
      alt: "Daily check-in, fan pass and badges"

  links:
