<footer class="site-footer">
  <div class="container">
    <div class="site-footer__inner">
      <div>
        <a class="wordmark" href="{{ '/' | relative_url }}">
          <img src="/assets/brand/logo.png" alt="" width="26" height="26">
          Bullets
        </a>
      </div>
      <nav>
        {%- for app in site.data.apps %}
        <a href="{{ app.slug | prepend: '/' | append: '/' | relative_url }}">{{ app.name }}</a>
        {%- endfor %}
        <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a href="mailto:{{ site.email }}">{{ site.email }}</a>
        <a href="https://github.com/{{ site.github_org }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
    <p class="site-footer__legal">&copy; {{ 'now' | date: '%Y' }} Bullets. All rights reserved.</p>
  </div>
</footer>
